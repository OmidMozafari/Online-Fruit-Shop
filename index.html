<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Online Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Online Fruit Shop</h1>
        <div id="ProductsContainer">
            <div id="products">
                <h2>Products</h2>
                <h6>Note: All the prices are based on per one kilogram</h6>
                <ul id="productList"></ul>
            </div>
            <div id="purchasing">
                <label for="">Product Name</label>
                <input type="text" id="productName">
                <small>Wrong Entry!. Kinldy select fruits from the list</small>

                <label for="">Quantity</label>
                <input type="number" id="productQuantity">
                <small id="invalidNumberError">Please enter a value more than 0</small>

                <button id="addToCart">Add To cart</button>
                
                <button id="stopPurchasing">Stop Purchasing</button>
                <small id="stopPurchasingError">Kinldy, add something to the cart first then click this button</small>



                <p id="message"></p>
                <h3>Current Total: 
                    <span id="total">0</span>
                    AFN
                </h3>
                <ul id="purchaseList"></ul>
            </div>
        </div>

    </div>
    <div class="result">
        <div id="finalCartTitels">
            <h2 id="finalTitle">Final Cart</h2>
            <div id="finalTotalTitleValueContainer">
            <h2 id="FinalTotalTitle">Final Price: </h2>
            <span id="FinalTotalValue"></span>
            </div>
        </div>
        <ul id="finalList"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>

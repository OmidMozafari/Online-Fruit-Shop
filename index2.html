<!DOCTYPE html>
<html lang="en">
<head>

    <title>Payment Page</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div id="container">
    <form action="">
        <div id="formTitleContainer">
        <h2>payment</h2>
        </div>
        <input type="text" class="paymentInputs" placeholder="First name">
        <input type="text" class="paymentInputs" placeholder="Last name">
        <input type="text" class="paymentInputs" placeholder="Card number">
        <input type="text" class="paymentInputs" placeholder="cvv">

        <div id="buttons">

    </div>
